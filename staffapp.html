<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reindirizzamento...</title>
<style>
  /* Reset base */
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: radial-gradient(circle at center, #0f0f0f, #1a1a1a);
    color: #fff;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
  }

  .container {
    text-align: center;
    animation: fadeIn 1s ease-in-out forwards;
  }

  h1 {
    font-size: 2rem;
    letter-spacing: 1px;
    text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff, 0 0 30px #00ffff;
    margin-bottom: 20px;
    animation: glow 1.5s infinite alternate;
  }

  .dots {
    display: flex;
    justify-content: center;
    gap: 10px;
  }

  .dot {
    width: 15px;
    height: 15px;
    background: #00ffff;
    border-radius: 50%;
    animation: bounce 1s infinite;
  }

  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  /* Animazioni */
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-15px); }
  }

  @keyframes glow {
    0% { text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff, 0 0 30px #00ffff; }
    100% { text-shadow: 0 0 20px #00ffff, 0 0 40px #00ffff, 0 0 60px #00ffff; }
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }
</style>
</head>
<body>
  <div class="container">
    <h1>Ti stiamo reindirizzando...</h1>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

  <script>
    // Reindirizza dopo 2 secondi
    setTimeout(() => {
      window.location.href = "https://3cgtsgco.forms.app/aurastudio-staff-provino";
    }, 2000);
  </script>
</body>
</html>
